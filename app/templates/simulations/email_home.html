{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <h2 class="mb-4">
        📧 Email Security Awareness Simulator
    </h2>

    <div class="card shadow-lg">

        <div class="card-header bg-dark text-white">
            Inbox (1 Unread)
        </div>

        <div class="list-group list-group-flush">

            <a href="{{ url_for('email.gmail') }}" class="list-group-item list-group-item-action">

                <div class="d-flex justify-content-between">

                    <strong>Google Security</strong>

                    <small class="text-danger">
                        Urgent
                    </small>

                </div>

                <div class="mt-2">

                    Your account has been flagged for unusual activity.
                    Verify your identity immediately to avoid suspension.

                </div>

                <small class="text-muted">
                    security-noreply@google-check.com
                </small>

            </a>

        </div>

    </div>

</div>

{% endblock %}
