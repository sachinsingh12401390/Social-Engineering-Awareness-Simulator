{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-body">

                    <h2 class="text-center mb-4">
                        🔍 URL Phishing Detection
                    </h2>

                    <p class="text-center text-muted">
                        Enter a website URL to analyze whether it appears safe or potentially suspicious.
                    </p>

                    <hr>

                    <form action="{{ url_for('url_checker.result') }}" method="POST">

                        <div class="mb-3">

                            <label class="form-label">
                                Website URL
                            </label>

                            <input type="text" class="form-control" name="url" placeholder="https://example.com"
                                required>

                        </div>

                        <div class="text-center">

                            <button type="submit" class="btn btn-primary btn-lg">

                                Analyze URL

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
