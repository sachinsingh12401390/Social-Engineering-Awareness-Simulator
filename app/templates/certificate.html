{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-body text-center">

            <h1 class="text-success">
                Certificate of Completion
            </h1>

            <hr>

            <h3>
                Awarded To
            </h3>

            <h2 class="mt-4">
                {{ user.name }}
            </h2>

            <p class="mt-3">
                For successfully completing the
                <strong>Social Engineering Awareness Simulator</strong>.
            </p>

            <p class="text-muted">
                {{ user.email }}
            </p>

            <div class="mt-4">

                <a href="{{ url_for('certificate.download') }}" class="btn btn-success">
                    Download PDF Certificate
                </a>

                <a href="{{ url_for('dashboard.home') }}" class="btn btn-primary">
                    Back to Dashboard
                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
