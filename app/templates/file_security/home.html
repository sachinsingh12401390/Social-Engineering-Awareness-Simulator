{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-body">

            <h2 class="mb-3">
                📁 File Attachment Security Simulator
            </h2>

            <p class="text-muted">
                Decide whether each email attachment is <strong>Safe</strong> or
                <strong>Malicious</strong>.
            </p>

            <hr>

            <form method="POST" action="{{ url_for('file_security.result') }}">

                {% for file in attachments %}

                <div class="card mb-3">

                    <div class="card-body">

                        <h5>

                            {{ loop.index }}.
                            {{ file.name }}

                        </h5>

                        <div class="form-check">

                            <input class="form-check-input" type="radio" name="q{{ loop.index0 }}" value="safe"
                                required>

                            <label class="form-check-label">

                                ✅ Safe

                            </label>

                        </div>

                        <div class="form-check">

                            <input class="form-check-input" type="radio" name="q{{ loop.index0 }}" value="malicious">

                            <label class="form-check-label">

                                ❌ Malicious

                            </label>

                        </div>

                    </div>

                </div>

                {% endfor %}

                <button class="btn btn-success w-100">

                    Submit Answers

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
